<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title> CAIXA LIVRE </title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


	<style>
		body{
    			background-color: #cad8e6;
    			font-family: Arial, sans-serif;
		}
		.topo{
			background: #78a3c5;
			text-align: center;		
			font-size: 43px;
			font-weight: bold;
			padding: 15px;
			border: 4px solid #ffeccf;
			color: #ffeccf;
			border-radius: 12px;
		}
		.painel{
			background: #fff7eb;
			padding: 20px;		
			border: 2px solid #78a3c5;
			margin-bottom: 10px;
			border-radius: 10px;
		}
		.total{
			font-size: 33px;		
			text-align: right;
			font-weight: bold;
			color: #78a3c5;
		}
		.titulo-badge{
			background-color: #a2c4d8;
			color: white;
			font-size: 18px;
			padding: 10px 15px;
			border-radius: 10px;
		}
		.btn-add{
			background-color: #78a3c5;
			color: white;
			font-weight: bold;
			border: none;
			padding: 12px;
			border-radius: 10px;
			transition: 0.3s;
		}
		btn-add:hover{
			backgrond-color: #5f8eaf;
			color: white;
		}
		.form-control{
			border: 2px solid #a2c4d8;
			border-radius: 10px;
		}
		.form-control:focus{
			border-color: #78a3c5;
			box-shadow: 0 0 0 0.2rem rgba(120, 163, 197, 0.25);
		}
		.list-group-item{
			background-color: #fff7eb;
			border: 1px solid #ffeccf;
			color: #5f7f97;
		}
	</style>

</head>

<body>
<div class="container mt-2">
	<div class="topo"> CAIXA LIVRE </div>

	<div class="row mt-3">
		<div class="col-md-7">
			<h3><span class="badge titulo-badge">SUAS COMPRAS</span></h3>
			<ul id="lista" class="list-group lista"> </ul>
		</div>

		<div class="col-md-5">
			<div class="painel"> Total: R$ <div class="total"> 0,00 </div></div>
			<div class="painel">
				<label> Código de Barras </label>
				<input type="text" id="cod" class="form-control">
			</div>
			<div class="painel">
				<label> Quantidade </label>
				<input type="number" id="qtd" class="form-control" value=1>
			</div>
			
			<div class="btn btn-add w-100" onclick="addProduto()">
			Adicionar Item
			</div>
		</div>
	</div>
</div>
<script src="script.js"></script>
</body>


</html>
