<html>
    <head>
        <meta charset="UTF-8">
        <title>Meu Pet Virtual</title>
    </head>

    <body>
        <img id="b" src="bichinho fofinho.png"/>
        <img id="btn" src="biscoito.png"/>

    </body>

    <script src="script.js">
        const cria = document.getElementById("b");
        const btn = document.getElementById("btn");

        const estados = {
            normal: "bichinho fofinho.png",
            bravo: "bichinho bravo.png",
            morto: "bichinho morto",
            feliz: "bichinho feliz.png",
            comendo: "bichinho comendo.png", 
            alimentado: "bichinho alimentado.png"
        }

        let contador = 0;
        let intervalo = null;
        let time_out = null;
        let time_click = null;

        function controlador (){
            if(intervalo) clearInterval(intervalo)

                intervalo = setInterval(() => {
                    contador++;
                    console.log("tempo: ", contador);

                    if(contador == 30){
                        cria.src = estados.bravo;
                    }
                    if(contador == 60){
                        cria.src = estados.morto;
                    }
                }, 1000);
        }
    </script>
</html>
